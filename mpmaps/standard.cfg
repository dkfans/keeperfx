; KeeperFX multiplayer mappack file
; KeeperFX mappack: Assorted KeeperFX maps with rules recommended by the KeeperFX team

[common]
NAME = KeeperFX Multiplayer maps
; NAME_TEXT_ID = 971
LEVELS_LOCATION = mpmaps/standard
LAND_LOCATION   = campgns/keeporig_lnd
;CREATURES_LOCATION = mpmaps/standard_crtr
CONFIGS_LOCATION = mpmaps/standard_cfgs
; Land view at start and end of the game
LAND_VIEW_START = rgmap00 viframe00
MEDIA_LOCATION = ldata
; The sprites used for marking locations which can be clicked. ENSIGNS or PINPOINTS.
LAND_MARKERS = ENSIGNS

