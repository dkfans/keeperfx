# Strings can also be used in level scripts. Example:
# IF(PLAYER0,TORTURER >= 1)
#    DISPLAY_INFORMATION(TORTURER_JOIN)
# ENDIF
[TORTURER_JOIN]
ENG = "A Torturer has escaped a torture room and joined your dungeon. Let's see what else he can do."
_GER = "Ein Folterknecht ist aus einem Folterraum entkommen und hat sich deinem Verlies angeschlossen. Mal sehen, was er sonst noch kann."
DUT = "Een folteraar is uit een folterkamer ontsnapt en heeft zich bij je kerker aangesloten. Laten we eens kijken wat hij nog meer kan."
RUS = "Палач сбежал из пыточной и пришел в Ваше подземелье. Посмотрим, на что еще он способен."

[BEHOLDER_JOIN]
# this one is just an example for maps where multiline messages are needed
# toml can do multiline by using 3 quotes like this
ENG = """A Beholder has joined you. These large, orb-shaped beings have several eyestalks and one central eye, each containing powerful magic. 
They feel an intense hatred for anything they can see, but especially for those that mock their lack of ears."""
_CHI = """一只眼魔加入了你。这个巨大、球状的生物长有多个眼梗和一只中央眼睛，每只眼睛都蕴含强大的魔法。  
它们对一切能看见的东西都怀有强烈的憎恨，尤其是那些嘲笑它们没有耳朵的生物。"""
_CZE = """K tobě se připojil Pozorovatel. Tito velcí, kulovití tvorové mají několik očních stopkách a jedno centrální oko, z nichž každé obsahuje mocnou magii.  
Cítí silnou nenávist ke všemu, co mohou spatřit, zejména k těm, kteří si tropí posměch z jejich absence uší."""
DUT = """Een Beholder heeft zich bij je aangesloten. Deze grote, bolvormige wezens hebben meerdere oogstelen en één centraal oog, elk met krachtige magie.  
Ze voelen een intense haat voor alles wat ze kunnen zien, vooral voor degenen die hun gebrek aan oren belachelijk maken."""
_FRE = """Un Œil maléfique vous a rejoint. Ces grandes créatures sphériques possèdent plusieurs pédoncules oculaires et un œil central, chacun contenant une puissante magie.  
Ils éprouvent une haine intense envers tout ce qu’ils peuvent voir, surtout ceux qui se moquent de leur absence d’oreilles."""
GER = """Ein Betrachter hat sich dir angeschlossen. Diese großen, kugelförmigen Wesen besitzen mehrere Augenstiele und ein zentrales Auge, die jeweils mächtige Magie enthalten.  
Sie empfinden einen intensiven Hass gegenüber allem, was sie sehen können, besonders gegenüber denen, die sich über ihre fehlenden Ohren lustig machen."""
_ITA = """Un Osservatore si è unito a te. Queste grandi creature sferiche possiedono numerosi peduncoli oculari e un occhio centrale, ciascuno contenente una potente magia.  
Provano un odio intenso verso tutto ciò che possono vedere, soprattutto verso chi deride la loro mancanza di orecchie."""
JPN = """ビホルダーがお前の手下に加わった。これ等の巨大な球状の存在は、複数の眼柄と一つの中心の目を持ち、それぞれが強力な魔法を宿している。  
彼らは自分が見えるあらゆるものに強い憎しみを抱き、とりわけ耳がないことを嘲る者を激しく嫌う。"""
_KOR = """비홀더가 당신에게 합류했습니다. 이 거대한 구형 생명체는 여러 개의 눈줄기와 하나의 중앙 눈을 가지고 있으며, 각각 강력한 마법을 품고 있습니다.  
그들은 자신이 볼 수 있는 모든 것에 강한 증오를 느끼며, 특히 귀가 없다는 것을 조롱하는 존재를 가장 싫어합니다."""
_LAT = """Oculus Malignus te iunxit. Haec magnae, orbiculares creaturae multos oculorum stipites et unum oculum centralem habent, quorum quisque potentem magicam continet.  
Intensum odium sentiunt erga omnia quae videre possunt, praesertim eos qui defectum aurium irrident."""
_POL = """Obserwator dołączył do ciebie. Te duże, kuliste istoty mają liczne oczodoły i jedno centralne oko, z których każde zawiera potężną magię.  
Czują intensywną nienawiść do wszystkiego, co mogą zobaczyć, zwłaszcza do tych, którzy wyśmiewają się z ich braku uszu."""
_POR = """Um Observador juntou-se a ti. Estas grandes criaturas esféricas possuem vários pedúnculos oculares e um olho central, cada um contendo magia poderosa.  
Sentem um ódio intenso por tudo o que conseguem ver, especialmente por aqueles que zombam da sua falta de orelhas."""
RUS = """Злобоглаз присоединился к Вам. Эти огромные шарообразные создания представляют собой гигантский глаз, от которого отходит несколько отростков, на которых расположены глаза поменьше. Каждый из этих глаз способен применять мощные заклинания.  
Они страшно ненавидят все, что видят, особенно тех, кто смеется над тем, что у них нет ушей."""
_SPA = """Un Vigilante se ha unido a ti. Estas grandes criaturas esféricas tienen varios pedúnculos oculares y un ojo central, cada uno con poderosa magia.  
Sienten un intenso odio hacia todo lo que pueden ver, especialmente hacia quienes se burlan de su falta de orejas."""
_SWE = """En Beholder har anslutit sig till dig. Dessa stora, klotformade varelser har flera ögonstjälkar och ett centralt öga, var och en med kraftfull magi.  
De känner ett intensivt hat mot allt de kan se, särskilt mot dem som hånar deras avsaknad av öron."""
_UKR = """Спостерігач приєднався до вас. Ці великі кулясті істоти мають кілька очних відростків і одне центральне око, кожне з яких містить потужну магію.  
Вони відчувають сильну ненавист до всього, що можуть бачити, особливо до тих, хто насміхається з їх відсутності вух."""
