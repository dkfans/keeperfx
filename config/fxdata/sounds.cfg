; =============================================================================
; Speech overrides
; Override any mentor speech message with a custom audio file.
; The path is relative to the game MEDIA_LOCATION/[language]/ folder. The MEDIA_LOCATION is specified in the campaign/mappack config, the language is the 3 letter ISO 639-2 code.
; If a speech is not available in a [language] it will try to read it directly from the MEDIA_LOCATION, or otherwise try from the /eng/ folder.
; Syntax:  <SMsg_Name> = <relative/path/to/file.ogg>
;
; Example:
;   GraveyardMadeVampire = custom_vampire.ogg
;   This would play `keeperfx/campgns/ger/custom_vampire.ogg` if you have your game set to german and a vampire rises from your graveyard.
;
; Full list of available names:
;   CreatrAngryAnyReason, CreatrAngryNoLair, CreatrAngryNotPaid, CreatrAngryNoFood,
;   CreatrDestroyRooms, CreatureLeaving, WallsBreach, HeartUnderAttack,
;   BattleDefeat, BattleVictory, BattleDeath, BattleWon,
;   CreatureDefending, CreatureAttacking, EnemyDestroyRooms, EnemyClaimGround,
;   EnemyRoomTakeOver, NewRoomTakenOver, LordOfLandComming, FingthingFriends,
;   BattleOver, GardenTooSmall, LairTooSmall, TreasuryTooSmall, LibraryTooSmall,
;   PrisonTooSmall, TortureTooSmall, TrainingTooSmall, WorkshopTooSmall,
;   ScavengeTooSmall, TempleTooSmall, GraveyardTooSmall, BarracksTooSmall,
;   NoRouteToGarden, NoRouteToTreasury, NoRouteToLair, EntranceClaimed,
;   EntranceLost, RoomTreasrNeeded, RoomLairNeeded, RoomGardenNeeded,
;   ResearchedRoom, ResearchedSpell, ManufacturedDoor, ManufacturedTrap,
;   NoMoreReseach, SpellbookTaken, TrapTaken, DoorTaken, SpellbookStolen,
;   TrapStolen, DoorStolen, TortureInformation, TortureConverted,
;   PrisonMadeSkeleton, TortureMadeGhost, PrisonersEscaping, GraveyardMadeVampire,
;   CreatrFreedPrison, PrisonersStarving, CreatureScanvenged, MinionScanvenged,
;   CreatureJoinedEnemy, CreatureRevealInfo, SacrificeGood, SacrificeReward,
;   SacrificeNeutral, SacrificeBad, SacrificePunish, SacrificeWishing,
;   DiscoveredSpecial, DiscoveredSpell, DiscoveredDoor, DiscoveredTrap,
;   CreaturesJoinedYou, DugIntoNewArea, SpecRevealMap, SpecResurrect,
;   SpecTransfer, CommonAcknowledge, SpecHeroStolen, SpecCreatrDoubled,
;   SpecIncLevel, SpecWallsFortify, SpecHiddenWorld, GoldLow, GoldNotEnough,
;   NoGoldToScavenge, NoGoldToTrain, Payday, FullOfPies, SurrealHappen,
;   StrangeAccent, PantsTooTight, CraveChocolate, SmellAgain, Hello, Glaagh,
;   Achew, Chgreche, WorkerJobsLimit, GameLoaded, GameSaved, DefeatedKeeper,
;   LevelFailed, LevelWon, SenceAvatar, AvatarBodyVanish, GameFinalVictory
; =============================================================================
[speech]
; Uncomment and set paths to override individual speech messages:
; GraveyardMadeVampire = custom_vampire.ogg
; LevelWon             = victory_fanfare.ogg
; To silence a message entirely, set its value to none, null, or 0:
; ManufacturedTrap     = none

