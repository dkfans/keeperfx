; KeeperFX Sound Configuration
; Use this file to replace hardcoded sound effects or speeches with different sounds.
; Custom sounds are played from the MEDIA_LOCATION, Custom speeches are read from MEDIA_LOCATION/[language]/ (ENG/DUT/CHI/...)
;
; Format: NAME = sample / id OR filepath [count]
;   NAME: Uppercase identifier for the sound
;   sample_id: Numeric ID in sound.dat/speech_***.dat or custom sound file path
;   count: Optional - for random selection from consecutive IDs
;
; Supported formats: WAV, OGG, MP3, FLAC

[common]
; === UI Sounds ===
;REFUSAL                ; Player action refused
;TAB_CLICK              ; GUI tab click
;GOLD_PICKUP            ; Gold picked up (32, 33, or 34)
;ZOOM                   ; Camera zoom

; === Room Sounds ===
;ROOM_CLAIM             ; Room tile claimed

;ROOM_BUILD             ; Room construction

; === Heart/Dungeon Sounds ===
;HEART_BEAT             ; Dungeon heart beat (150, 151)
;HEART_BEAT_DOWN        ; Heartbeat expanding
;HEART_BEAT_UP          ; Heartbeat contracting
;HEART_ATTACK           ; Heart under attack

; === Door Sounds ===
;DOOR_OPEN
;DOOR_CLOSE
;DOOR_PLACE = 72 3      ; Door placement (72, 73, 74)

; === Digging Sounds ===
;DIG_IMPACT             ; Pickaxe impact
;DIG_DIRT               ; Dirt rubble placed
;DIG_SUCCESS            ; Block cleared

; === Combat Sounds ===
;SPLASH                 ; Water splash
;EXPLOSION              ; Generic explosion

