; KeeperFX Sound Configuration
; Maps sound names to sample IDs for use in configs and scripts
;
; Format: NAME = sample_id [count]
;   NAME: Uppercase identifier for the sound
;   sample_id: Numeric ID in sound.dat or custom sound file path
;   count: Optional - for random selection from consecutive IDs
;
;
; Supported formats: WAV, OGG, MP3, FLAC (via SDL2_mixer)

[common]
; === UI Sounds ===
REFUSAL = 119               ; Player action refused
TAB_CLICK = 62              ; GUI tab click
GOLD_PICKUP = 32 3          ; Gold picked up (32, 33, or 34)
ZOOM = 177                  ; Camera zoom

; === Room Sounds ===
ROOM_CLAIM = 116            ; Room tile claimed

ROOM_BUILD = 1              ; Room construction

; === Heart/Dungeon Sounds ===
HEART_BEAT = 150 2          ; Dungeon heart beat (150, 151)
HEART_BEAT_DOWN = 150       ; Heartbeat expanding
HEART_BEAT_UP = 151         ; Heartbeat contracting
HEART_ATTACK = 117          ; Heart under attack

; === Door Sounds ===
DOOR_OPEN = 92
DOOR_CLOSE = 91
DOOR_PLACE = 72 3           ; Door placement (72, 73, 74)

; === Digging Sounds ===
