; KeeperFX Sound Configuration
; This file is the canonical mapping of sound names to sound.dat IDs.
; These defaults ship with the game; campaigns, mods, and levels can layer on top to override any entry.
;
; Load order (each layer overrides the previous; last write wins):
;   1. fxdata/sounds.cfg                     — this file; shipped defaults
;   2. mods/<name>/sounds.cfg                — mods listed before the campaign (after_base)
;   3. <campaign config dir>/sounds.cfg      — campaign-specific overrides
;   4. mods/<name>/sounds.cfg                — mods listed after the campaign (after_campaign)
;   5. levels/map<NNNNN>/sounds.cfg          — per-map overrides (reset between maps)
;
; Note : Sounds are reset when returning to the main menu and will default to the following ids listed here
;
; Format:
;   NAME = id [count]                — register a name for a sound.dat ID
;   NAME = filepath [count]          — replace a named sound with a custom file
;   id   = filepath [count] [ALIAS]  — redirect a raw sound.dat ID to a custom file;
;                                      ALIAS optionally registers the sound under that name
;                                      for use in creature/magic configs and scripts
;
;   count:  optional number of consecutive variants for random selection (default 1)
;   ALIAS:  optional name token (must start with a letter or underscore)
;
; Examples:
;   SPLASH = custom/mysplash.wav           ; replace the named splash sound
;   36 = custom/mysplash.wav               ; redirect raw ID 36 to a custom file
;   777 = custom/boom.wav 3 MY_BOOM        ; redirect IDs 777/778/779, alias as MY_BOOM
;
; Supported formats: WAV, OGG, MP3, FLAC

