# Extra strings 
# The aliases in translation.toml can be used in cfgs anywhere a text id is used. Make sure they are unique or they will get overwritten.
# It's possible to add additional translation.toml files in the CONFIGS_LOCATION folder of campaigns, maps and mods, or in LEVELS_LOCATION when named `map0####.translation.toml`

# BEHOLDER_NAME could be used on the NameTextID for creatrs/beholder.cfg
[BEHOLDER_NAME]
# short comment about the string can go here
# name of a creature
# floating monster with a large central eye and many eyestalks, each with a smaller eye
ENG = "Beholder"
# when a string has been machine translated, we mark it with an underscore so we can easily find them and improve them later
# a translator who speaks the language can remove the underscore when he validates or corrects the translation
_CHI = "眼魔"
# if traditional chinese hasn't been translated it'll fallback on CHI
#CHT = 
# other languages (or when chi is also missing) will fallback on ENG 
# so in this case the Dutch,German and Swedish are technically redundant in this example as it's same word as ENG 
_CZE = "Pozorovatel"
DUT = "Beholder"
_FRE = "Œil maléfique"
GER = "Betrachter"
_ITA = "Osservatore"
JPN = "ビホルダー"
_KOR = "비홀더"
_LAT = "Oculus Malignus"
_POL = "Obserwator"
_POR = "Observador"
_RUS = "Злобоглаз"
_SPA = "Vigilante"
_SWE = "Beholder"
_UKR = "Спостерігач"

